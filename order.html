<!DOCTYPE html>
<html>
<head>
<title>Obsidian Arc Lab - Orders</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  border-bottom:2px solid #c2a66b;
  background:linear-gradient(90deg,#000,#111);
}

.header h2{
  margin:0;
  color:#c2a66b;
  letter-spacing:3px;
}

.header p{
  margin:5px 0 0;
}

/* ORDER COUNT */
.countBox{
  text-align:center;
  margin-top:15px;
  font-size:14px;
  color:#c2a66b;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #333;
  color:#c2a66b;
}

td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid #333;
  font-size:12px;
}

button{
  padding:6px 10px;
  border-radius:5px;
  background:#c2a66b;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#e0c27a;
}

select{
  padding:5px;
  border-radius:5px;
  color:white;
  border:1px solid #444;
  font-size:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h2>OBSIDIAN ARC LAB</h2>
<p>ORDER MANAGEMENT SYSTEM</p>
</div>

<div class="countBox">
Total Orders: <span id="orderCount">0</span>
</div>

<table>
<thead>
<tr>
<th>Order Id</th>
<th>Date Time</th>
<th>Customer Name</th>
<th>Customer Phone No.</th>
<th>Receiver Name</th>
<th>Receiver Phone No.</th>
<th>Receiver Address</th>
<th>Receipt</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzmTD4ct44yQVxZ2H6yoX8JYbSiyVyot-Ge-YHLnvmqhNuC8V_flpQpZewfVrE9OR81/exec";

let dataStore = [];

/* FORMAT DATE */
function formatDateTime(dt) {
  if (!dt) return "";

  let d = new Date(dt);

  let year = d.getFullYear();
  let month = String(d.getMonth() + 1).padStart(2, '0');
  let day = String(d.getDate()).padStart(2, '0');

  let hours = String(d.getHours()).padStart(2, '0');
  let minutes = String(d.getMinutes()).padStart(2, '0');
  let seconds = String(d.getSeconds()).padStart(2, '0');

  return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}

/* LOAD DATA */
function loadData(){

fetch(URL)
.then(res => res.text())
.then(text => {

let data = JSON.parse(text);
dataStore = data;

document.getElementById("orderCount").innerText = data.length;

let html = "";

data.forEach((r, index) => {

/* 🔥 DARK STATUS COLORS ONLY */
let bg = "#222";

if(r.status === "Pending") bg = "#7f1d1d";      // dark red
else if(r.status === "Progress") bg = "#854d0e"; // dark yellow (amber)
else if(r.status === "Complete Order") bg = "#14532d"; // dark green

html += `
<tr>
<td>${r.orderId || ""}</td>
<td>${formatDateTime(r.dateTime)}</td>
<td>${r.customerName || ""}</td>
<td>${r.customerNo || ""}</td>
<td>${r.receiverName || ""}</td>
<td>${r.receiverPhone || ""}</td>

<td style="max-width:200px; word-wrap:break-word;">
${r.receiverAddress || ""}
</td>

<td>
<button onclick="openReceipt(${index})">View</button>
</td>

<td>
<select id="status-${index}" style="
  background:${bg};
  color:white;
  padding:5px;
  border-radius:5px;
  border:1px solid #444;
  font-size:12px;
  font-weight:bold;
">
  <option style="color:black" ${r.status=="Pending"?"selected":""}>Pending</option>
  <option style="color:black" ${r.status=="Progress"?"selected":""}>Progress</option>
  <option style="color:black" ${r.status=="Complete Order"?"selected":""}>Complete Order</option>
</select>
</td>

<td>
<button onclick="updateStatus(${index})">Update</button>
</td>
</tr>
`;

});

document.getElementById("table").innerHTML = html;

});

}

/* OPEN RECEIPT */
function openReceipt(index){

let url = dataStore[index].receiptLink;

if(!url || url.trim() === ""){
  alert("No receipt available");
  return;
}

window.open(url.trim(), "_blank");
}

/* UPDATE STATUS */
function updateStatus(index){

let newStatus = document.getElementById("status-"+index).value;

fetch(URL,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:new URLSearchParams({
action:"update",
orderId: dataStore[index].orderId,
status:newStatus
})
})
.then(res=>res.text())
.then(res=>{
alert("Updated!");
loadData();
});

}

loadData();

</script>

</body>
</html>
