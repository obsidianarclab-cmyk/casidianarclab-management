<!DOCTYPE html>
<html>
<head>
  <title>Material</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>📦 Material / Reminder</h2>

  <input id="name" placeholder="Material Name">
  <input id="qty" placeholder="Quantity">
  <input id="note" placeholder="Reminder Note">

  <button class="btn green" onclick="add()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Qty</th>
        <th>Note</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="matTable"></tbody>
  </table>

</div>

<script>
let materials = [];

function add(){
  materials.push({
    name:name.value,
    qty:qty.value,
    note:note.value
  });

  render();
}

function render(){
  let t = document.getElementById("matTable");
  t.innerHTML = "";

  materials.forEach((m,i)=>{
    t.innerHTML += `
      <tr>
        <td>${m.name}</td>
        <td>${m.qty}</td>
        <td>${m.note}</td>
        <td><button onclick="del(${i})">X</button></td>
      </tr>
    `;
  });
}

function del(i){
  materials.splice(i,1);
  render();
}
</script>

</body>
</html>
