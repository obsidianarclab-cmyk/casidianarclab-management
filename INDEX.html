<!DOCTYPE html>
<html>
<head>
  <title>Casidian Arc Lab Management System</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #051136, #1e293b);
      color: white;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #043145, #6366f1);
      color: black;
    }

    .hero h1 {
      margin: 0;
      font-size: 42px;
    }

    .hero p {
      margin-top: 10px;
      font-size: 16px;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 15px;
      width: 250px;
      transition: 0.3s;
      backdrop-filter: blur(6px);
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(255,255,255,0.15);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<!-- HERO SECTION -->
<div class="hero">
  <h1>Casidian Arc Lab</h1>
  <p>Smart Expense & Material Management System</p>
</div>

<!-- MAIN MENU -->
<div class="container">

  <div class="menu">

    <div class="card">
      <h3>💳 Expense Tracker</h3>
      <p>Track company & personal expenses</p>
      <a href="payment.html" class="btn">Open</a>
    </div>

    <div class="card">
      <h3>📦 Material System</h3>
      <p>Manage materials & reminders</p>
      <a href="material.html" class="btn">Open</a>
    </div>

  </div>

  <div class="footer">
    Designed for Casidian Arc Lab Internal System
  </div>

</div>

</body>
</html>
